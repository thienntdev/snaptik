version: "3.8"

services:
  # ===== Application =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snaptiktok-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - ENV=production
      - APP_NAME=SnapTiktok
      - BASE_URL=https://snaptiktok.com
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - CACHE_TTL_HOURS=3
      - RATE_LIMIT_MAX=15
      - RATE_LIMIT_WINDOW_SEC=60
      - TEMP_DIR=/app/tmp/downloads
    volumes:
      - app-tmp:/app/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - snaptiktok-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: snaptiktok-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    networks:
      - snaptiktok-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: snaptiktok-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # Mount SSL certs if available
    depends_on:
      - app
    networks:
      - snaptiktok-net

volumes:
  app-tmp:
  redis-data:

networks:
  snaptiktok-net:
    driver: bridge
